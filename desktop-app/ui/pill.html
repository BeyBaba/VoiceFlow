<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>VoiceFlow Pill</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }

    .pill-zone {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 6px;
    }

    .pill {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      /* iPhone-style home indicator — white bar */
      width: 134px;
      height: 5px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.5);
    }

    .pill:hover,
    .pill.expanded {
      width: 280px;
      height: 42px;
      border-radius: 21px;
      background: rgba(255, 255, 255, 0.97);
      opacity: 1;
      box-shadow:
        0 2px 12px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .pill-content {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.25s ease;
      white-space: nowrap;
      pointer-events: none;
    }

    .pill:hover .pill-content,
    .pill.expanded .pill-content {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .pill-icon-svg {
      color: #0F766E;
      flex-shrink: 0;
    }

    .pill-text {
      font-size: 12.5px;
      font-weight: 600;
      color: #1c1917;
      letter-spacing: 0.01em;
    }

    .pill-kbd {
      padding: 2px 6px;
      background: #f5f5f4;
      border: 1px solid #e7e5e4;
      border-radius: 4px;
      font-size: 10px;
      font-family: monospace;
      font-weight: 700;
      color: #0F766E;
    }

    /* Recording state */
    .pill.recording {
      width: 280px;
      height: 42px;
      border-radius: 21px;
      background: rgba(255, 255, 255, 0.97);
      opacity: 1;
      box-shadow:
        0 2px 12px rgba(239, 68, 68, 0.2),
        0 0 0 2px rgba(239, 68, 68, 0.3);
      animation: pulse-rec 1.5s ease-in-out infinite;
    }

    .pill.recording .pill-content {
      opacity: 1;
      transform: scale(1);
    }

    @keyframes pulse-rec {
      0%, 100% { box-shadow: 0 2px 12px rgba(239, 68, 68, 0.2), 0 0 0 2px rgba(239, 68, 68, 0.3); }
      50% { box-shadow: 0 2px 20px rgba(239, 68, 68, 0.3), 0 0 0 4px rgba(239, 68, 68, 0.15); }
    }

    /* Wave bars */
    .wave-mini {
      display: none;
      align-items: center;
      gap: 2px;
      height: 18px;
    }

    .pill.recording .wave-mini { display: flex; }
    .pill.recording .idle-content { display: none; }

    .wave-mini-bar {
      width: 3px;
      border-radius: 3px;
      background: #EF4444;
      animation: wave-mini 1s ease-in-out infinite;
    }

    .wave-mini-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
    .wave-mini-bar:nth-child(2) { height: 10px; animation-delay: 0.1s; }
    .wave-mini-bar:nth-child(3) { height: 16px; animation-delay: 0.2s; }
    .wave-mini-bar:nth-child(4) { height: 12px; animation-delay: 0.3s; }
    .wave-mini-bar:nth-child(5) { height: 16px; animation-delay: 0.2s; }
    .wave-mini-bar:nth-child(6) { height: 10px; animation-delay: 0.1s; }
    .wave-mini-bar:nth-child(7) { height: 6px; animation-delay: 0s; }

    @keyframes wave-mini {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    .rec-text {
      font-size: 12px;
      font-weight: 600;
      color: #EF4444;
      margin-left: 6px;
    }

    /* Result state */
    .pill.has-result {
      width: 280px;
      height: 42px;
      border-radius: 21px;
      background: rgba(255, 255, 255, 0.97);
      opacity: 1;
      box-shadow:
        0 2px 12px rgba(15, 118, 110, 0.15),
        0 0 0 2px rgba(15, 118, 110, 0.2);
    }

    .pill.has-result .pill-content { opacity: 1; transform: scale(1); }
    .pill.has-result .idle-content { display: none; }
    .pill.has-result .result-content { display: flex !important; }

    .result-content {
      display: none !important;
      align-items: center;
      gap: 6px;
    }

    .result-check { color: #22C55E; font-size: 14px; }
    .result-label { font-size: 12px; color: #1c1917; font-weight: 600; }
  </style>
</head>
<body>
  <div class="pill-zone">
    <div class="pill" id="pill">
      <div class="pill-content">
        <!-- Idle -->
        <div class="idle-content" style="display:flex;align-items:center;gap:8px;">
          <svg class="pill-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
          </svg>
          <span class="pill-text">Dikte et</span>
          <span class="pill-kbd">Ctrl+Space</span>
        </div>
        <!-- Recording wave bars -->
        <div class="wave-mini">
          <div class="wave-mini-bar"></div><div class="wave-mini-bar"></div><div class="wave-mini-bar"></div>
          <div class="wave-mini-bar"></div><div class="wave-mini-bar"></div><div class="wave-mini-bar"></div>
          <div class="wave-mini-bar"></div>
          <span class="rec-text">Kaydediliyor...</span>
        </div>
        <!-- Result -->
        <div class="result-content">
          <span class="result-check">✓</span>
          <span class="result-label">Panoya kopyalandi</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const pill = document.getElementById("pill");

    pill.addEventListener("click", () => {
      window.voiceflow.pillClicked();
    });

    window.voiceflow.onPillState((state) => {
      pill.classList.remove("recording", "has-result", "expanded");
      if (state === "recording") {
        pill.classList.add("recording");
      } else if (state === "result") {
        pill.classList.add("has-result");
        setTimeout(() => pill.classList.remove("has-result"), 3000);
      } else if (state === "expanded") {
        pill.classList.add("expanded");
      }
    });
  </script>
</body>
</html>
