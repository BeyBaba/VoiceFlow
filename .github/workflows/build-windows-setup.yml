name: Build Windows Setup

on:
  # Otomatik: package.json degistiginde (versiyon guncelleme)
  push:
    paths:
      - 'desktop-app/package.json'
    branches:
      - main
      - master
      - 'claude/**'
  # Manuel: GitHub Actions sayfasindan tetikle
  workflow_dispatch:
    inputs:
      version:
        description: 'Versiyon numarasi (ornek: 4.1.0)'
        required: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from package.json
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./desktop-app/package.json').version")
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "Version: $VERSION"

      - name: Check if release already exists
        id: check
        shell: bash
        run: |
          if [ "${{ github.ref }}" != "refs/heads/master" ] && [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
            echo "Skipping release — not on master/main branch."
          elif gh release view "v${{ steps.version.outputs.VERSION }}" > /dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.VERSION }} already exists, skipping."
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          cd desktop-app
          npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build Windows Setup
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          cd desktop-app
          npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder

      - name: Upload Setup EXE
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: VoiceFlow-Setup-${{ steps.version.outputs.VERSION }}
          path: desktop-app/dist/*.exe
          retention-days: 90

      - name: Create Release
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: VoiceFlow v${{ steps.version.outputs.VERSION }}
          body: |
            ## VoiceFlow v${{ steps.version.outputs.VERSION }}

            ### Kurulum
            1. Asagidaki **VoiceFlow.Setup.${{ steps.version.outputs.VERSION }}.exe** dosyasini indirin
            2. Cift tiklayin
            3. Otomatik kurulacak ve calisacak

            > Node.js, Electron veya baska bir sey yuklemenize gerek yok. Her sey paketin icinde.
          files: desktop-app/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
